      将自己的所思所想暴露在众人面前，本就是一件极端危险的事，但是这件事我想的越久，就越难以控制这份冲动。
      <br>
      或许人都有自我毁灭的倾向，所幸我有过几次崩溃之后的经验：通常来讲，人脑会在经历无法承受的情绪之后，选择遗忘那段记忆，这是人脑的自我保护机制。
      <br>
      我可能是有些有恃无恐，也有些难以拒绝这件事带来的诱惑：我以为，只有完全彻底的、清晰无碍的表达了自己，才能与他人建立真正的联系。
      <br>
      我渴望与人建立真正的联系。这段话既是我做这件事的真实原因，也是21岁青年报告的发刊词，欢迎关注。
